server:
  port: 8080

spring:
  application:
    name: nebula-start

  datasource:
    url: JDBC:mysql://localhost:3306/nebula_blog?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      database: 0

mybatis-flex:

  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

  global-config:
    print-banner: false

#  secret：用作 HS256 签名密钥，必须保证长度足够（>=32字节），否则会报错。
#  expire：token 过期时间，单位毫秒，这里 604800000ms = 7天。
jwt:
  secret: nebula-blog-auth-secret-key-nebula-blog-auth-secret-key
  expire: 604800000